services:
  redis:
    image: redis:7-alpine
    container_name: scrapio-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres:
    image: postgres:16-alpine
    container_name: scrapio-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: scrapio
      POSTGRES_USER: scrapio
      POSTGRES_PASSWORD: scrapio
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scrapio -d scrapio"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: .
    container_name: scrapio-api
    command: ["npm", "run", "dev:api"]
    ports:
      - "4000:4000"
    environment:
      API_PORT: 4000
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://scrapio:scrapio@postgres:5432/scrapio
      STORAGE_DIR: /app/storage
    volumes:
      - app-storage:/app/storage
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  worker:
    build: .
    container_name: scrapio-worker
    command: ["npm", "run", "worker"]
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://scrapio:scrapio@postgres:5432/scrapio
      STORAGE_DIR: /app/storage
    volumes:
      - app-storage:/app/storage
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  web:
    build: .
    container_name: scrapio-web
    command: ["npm", "run", "dev:web"]
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - api

volumes:
  redis-data:
  postgres-data:
  app-storage:
